<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Currency Converter</title>
</head>
<body>

<h2>Currency Converter</h2>

<label>Amount: </label>
<input type="number" id="amount" value="100"><br><br>

<label>From: </label>
<select id="from">
    <option value="USD">USD</option>
    <option value="EUR">EUR</option>
    <option value="GBP">GBP</option>
</select>

<label>To: </label>
<select id="to">
    <option value="USD">USD</option>
    <option value="EUR">EUR</option>
    <option value="GBP">GBP</option>
</select><br><br>

<button onclick="convert()">Convert</button>

<p id="result"></p>

<script>
// class for handling conversions
class CurrencyConverter {
    constructor(amount) {
        this.amount = amount;
    }
    // convert between currencies
    convert(from, to) {
        const rates = {
            USD: {EUR: 0.93, GBP: 0.81, USD: 1},
            EUR: {USD: 1.075, GBP: 0.87, EUR: 1},
            GBP: {USD: 1.23, EUR: 1.15, GBP: 1}
        };
        return Math.round(this.amount * rates[from][to] * 100) / 100;
    }
}
// converts when button is clicked
function convert() {
    const amount = parseFloat(document.getElementById("amount").value);
    const from = document.getElementById("from").value;
    const to = document.getElementById("to").value;

    const converter = new CurrencyConverter(amount);
    const result = converter.convert(from, to);

    document.getElementById("result").innerText = 
        `${amount} ${from} = ${result} ${to}`;
}
</script>
</body>
</html>
